<!DOCTYPE html>
<html>
<head>
    <title>Mi página</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
            color: white;
            font-family: Arial;
            text-align: center;
            padding: 50px;
        }

        h1 {
            font-size: 3em;
        }

        p {
            font-size: 1.2em;
            opacity: 0.8;
        }

        .btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: cyan;
            color: black;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .btn:hover {
            background: white;
        }
    </style>
</head>
<body>
    <h1>Hola, soy Alexander 👋</h1>
    <p>Bienvenido a mi página web</p>
    <button class="btn">Contáctame</button>
</body>
</html>
