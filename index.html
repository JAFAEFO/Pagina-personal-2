<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Yalex</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: white;
        }

        /* 🎥 VIDEO DE FONDO */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        /* 🔝 NAVBAR */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            text-align: center;
        }

        .navbar button {
            margin: 5px;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
            border-radius: 8px;
        }

        .navbar button:hover {
            background: cyan;
        }

        /* 📦 SECCIONES */
        .seccion {
            display: none;
            padding-top: 100px;
            text-align: center;
        }

        .active {
            display: block;
        }

        h1 {
            font-size: 2.5em;
        }

        textarea {
            width: 80%;
            max-width: 500px;
        }

        pre {
            background: black;
            padding: 10px;
            margin-top: 10px;
            display: inline-block;
            text-align: left;
        }
    </style>
</head>

<body>

    <!-- 🎬 VIDEO -->
    <video autoplay muted loop playsinline id="bg-video">
        <source src="video.mp4" type="video/mp4">
    </video>

    <!-- 🔝 MENU -->
    <div class="navbar">
        <button onclick="mostrar('main')">Inicio</button>
        <button onclick="mostrar('gaby')">Gaby</button>
        <button onclick="mostrar('evodio')">Evodio</button>
        <button onclick="mostrar('margarita')">Margarita</button>
    </div>

    <!-- 🏠 MAIN -->
    <div id="main" class="seccion active">
        <h1>Weeeeell, esta sera la nueva pagina de Yalex</h1>
        <p>Pronto se iran agregando apartados para cada quien</p>
    </div>

    <!-- 👤 GABY -->
    <div id="gaby" class="seccion">
        <h1>Sección Gaby</h1>

        <textarea id="codigo" rows="10" placeholder="Escribe código Python aquí..."></textarea>
        <br><br>

        <button onclick="ejecutarPython()">Ejecutar Python</button>

        <pre id="output"></pre>
    </div>

    <!-- 👤 EVODIO -->
    <div id="evodio" class="seccion">
        <h1>Evodio</h1>
        <p>Aquí irá su contenido</p>
    </div>

    <!-- 👤 MARGARITA -->
    <div id="margarita" class="seccion">
        <h1>Margarita</h1>
        <p>Aquí irá su contenido</p>
    </div>

    <!-- 🧠 JS SECCIONES -->
    <script>
        function mostrar(seccion) {
            document.querySelectorAll('.seccion').forEach(s => s.classList.remove('active'));
            document.getElementById(seccion).classList.add('active');
        }
    </script>

    <!-- 🐍 PYTHON -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>

    <script>
        let pyodideReady = loadPyodide();

        async function ejecutarPython() {
            let pyodide = await pyodideReady;
            let codigo = document.getElementById("codigo").value;

            try {
                let resultado = await pyodide.runPythonAsync(codigo);
                document.getElementById("output").textContent = resultado;
            } catch (error) {
                document.getElementById("output").textContent = error;
            }
        }
    </script>

</body>
</html>
